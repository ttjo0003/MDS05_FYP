<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Video + Hand Landmarks</title>
<style>
  body {
    display: flex;
    flex-direction: row;
    background: #222;
    color: #fff;
    margin: 0;
    height: 100vh;
    font-family: monospace;
    align-items: center;
    justify-content: center;
  }
  #video-container {
    position: relative;
    width: 640px;
    height: 480px;
  }
  video, canvas {
    position: absolute;
    width: 640px;
    height: 480px;
    border-radius: 10px;
  }
  #keypointsPanel {
    margin-left: 20px;
    width: 400px;
    height: 480px;
    overflow-y: auto;
    background: #111;
    padding: 10px;
    border-radius: 10px;
  }
</style>
</head>
<body>

<div id="video-container">
  <video id="video" autoplay muted></video>
  <canvas id="canvas"></canvas>
</div>

<div id="keypointsPanel">
  <h3>Current Frame Keypoints</h3>
  <pre id="jsonOutput">{}</pre>
</div>

<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>

<script src="app.js"></script>

</body>
</html>
